<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Transposition Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 600px;">
        <h2 class="text-dark mb-4">Mã hóa Transposition</h2>
        <div class="mb-3">
            <label class="form-label">Văn bản:</label>
            <textarea id="text" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Số cột (Key):</label>
            <input type="number" id="key" class="form-control" value="3">
        </div>
        <div class="d-flex gap-2 mb-3">
            <button onclick="send('encrypt')" class="btn btn-dark w-50">Mã hóa</button>
            <button onclick="send('decrypt')" class="btn btn-outline-dark w-50">Giải mã</button>
        </div>
        <div class="p-3 bg-dark text-info font-monospace rounded">
            <strong>Kết quả:</strong> <span id="output"></span>
        </div>
        <a href="index.html" class="btn btn-link mt-2">Quay lại</a>
    </div>
    <script>
        async function send(act) {
            const payload = { key: parseInt(document.getElementById('key').value), [act === 'encrypt' ? 'plain_text' : 'cipher_text']: document.getElementById('text').value };
            const res = await fetch(`http://127.0.0.1:1234/api/transposition/${act}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            document.getElementById('output').innerText = data.encrypted_text || data.decrypted_text;
        }
    </script>
</body>
</html>
