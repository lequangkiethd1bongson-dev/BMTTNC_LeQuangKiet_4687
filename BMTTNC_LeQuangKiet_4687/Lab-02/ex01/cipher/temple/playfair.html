<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .matrix td { width: 40px; height: 40px; text-align: center; border: 1px solid #ccc; font-weight: bold; background: white; }
    </style>
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 700px;">
        <h2 class="text-info mb-4">Mã hóa Playfair</h2>
        <div class="row">
            <div class="col-md-7">
                <label class="form-label">Văn bản:</label>
                <textarea id="text" class="form-control mb-3" rows="3"></textarea>
                <label class="form-label">Khóa (Key):</label>
                <input type="text" id="key" class="form-control mb-3" placeholder="Ví dụ: HUTECH">
                <div class="d-flex gap-2">
                    <button onclick="send('encrypt')" class="btn btn-info text-white w-50">Mã hóa</button>
                    <button onclick="send('decrypt')" class="btn btn-outline-info w-50">Giải mã</button>
                </div>
            </div>
            <div class="col-md-5 text-center">
                <label class="form-label">Ma trận 5x5:</label>
                <div id="matrix-box"></div>
            </div>
        </div>
        <div class="mt-4 p-3 bg-dark text-warning rounded">
            <strong>Kết quả:</strong> <span id="output"></span>
        </div>
        <a href="index.html" class="btn btn-link mt-3">Quay lại</a>
    </div>
    <script>
        async function send(act) {
            const payload = { key: document.getElementById('key').value, [act === 'encrypt' ? 'plain_text' : 'cipher_text']: document.getElementById('text').value };
            const res = await fetch(`http://127.0.0.1:1234/api/playfair/${act}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            document.getElementById('output').innerText = data.encrypted_text || data.decrypted_text;
            updateMatrix();
        }
        async function updateMatrix() {
            const res = await fetch('http://127.0.0.1:1234/api/playfair/creatematrix', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({key: document.getElementById('key').value}) });
            const data = await res.json();
            let html = '<table class="matrix mx-auto">';
            data.playfair_matrix.forEach(row => { html += '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>'; });
            document.getElementById('matrix-box').innerHTML = html + '</table>';
        }
    </script>
</body>
</html>
